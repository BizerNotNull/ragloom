[advisories]
version = 2
# lopdf 0.42.0 still requires ttf-parser, and RUSTSEC-2026-0192 has no
# patched release. Remove this exact exception when lopdf migrates away.
ignore = ["RUSTSEC-2026-0192"]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "ISC",
    "Zlib",
]
# rust-s3 currently pulls these transitively for sync HTTP transport and aws-creds.
# Keep the exception scoped to the exact crates instead of globally allowing the licenses.
exceptions = [
    { crate = "attohttpc", allow = ["MPL-2.0"] },
    { crate = "tiny-keccak", allow = ["CC0-1.0"] },
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
