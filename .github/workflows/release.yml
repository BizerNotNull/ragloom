name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Crate version from Cargo.toml (for example 0.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: prepare-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
      tag: ${{ steps.verify.outputs.tag }}
      release_ref: ${{ steps.plan.outputs.release_ref }}
      create_tag: ${{ steps.plan.outputs.create_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Verify release version
        id: verify
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
        run: python .github/scripts/verify-release-version.py

      - name: Plan release ref
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ steps.verify.outputs.tag }}"
          if git rev-parse --verify --quiet "refs/tags/${release_tag}" >/dev/null; then
            release_ref="$(git rev-list -n 1 "${release_tag}")"
            echo "release_ref=${release_ref}" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "release_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          fi

  deep-quality:
    name: deep-quality
    needs: prepare-release
    uses: ./.github/workflows/quality-deep.yml

  release-binaries:
    name: release-binaries (${{ matrix.target }})
    needs:
      - prepare-release
      - deep-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: ragloom
            archive_extension: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: ragloom
            archive_extension: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: ragloom.exe
            archive_extension: zip
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.target }}/"

      - name: Package Unix release archive
        if: matrix.archive_extension == 'tar.gz'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          archive_basename="ragloom-${RELEASE_TAG}-${{ matrix.target }}"
          tar -C "dist/${{ matrix.target }}" -czf "dist/${archive_basename}.tar.gz" "${{ matrix.binary_name }}"

      - name: Package Windows release archive
        if: matrix.archive_extension == 'zip'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          $archiveBasename = "ragloom-$env:RELEASE_TAG-${{ matrix.target }}"
          Compress-Archive `
            -Path "dist/${{ matrix.target }}/${{ matrix.binary_name }}" `
            -DestinationPath "dist/$archiveBasename.zip"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist/${{ matrix.target }}
          output-file: ragloom-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          archive_basename="ragloom-${RELEASE_TAG}-${{ matrix.target }}"
          archive_path="dist/${archive_basename}.${{ matrix.archive_extension }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive_path}" > "dist/${archive_basename}.sha256.txt"
          else
            shasum -a 256 "${archive_path}" > "dist/${archive_basename}.sha256.txt"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/ragloom-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.${{ matrix.archive_extension }}
            dist/ragloom-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.sha256.txt
            ragloom-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.spdx.json

  release-binaries-best-effort:
    name: release-binaries-best-effort (${{ matrix.target }})
    needs:
      - prepare-release
      - deep-quality
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: ragloom
            archive_extension: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            binary_name: ragloom
            archive_extension: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.target }}/"

      - name: Package Unix release archive
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          archive_basename="ragloom-${RELEASE_TAG}-${{ matrix.target }}"
          tar -C "dist/${{ matrix.target }}" -czf "dist/${archive_basename}.tar.gz" "${{ matrix.binary_name }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist/${{ matrix.target }}
          output-file: ragloom-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          archive_basename="ragloom-${RELEASE_TAG}-${{ matrix.target }}"
          archive_path="dist/${archive_basename}.${{ matrix.archive_extension }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive_path}" > "dist/${archive_basename}.sha256.txt"
          else
            shasum -a 256 "${archive_path}" > "dist/${archive_basename}.sha256.txt"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/ragloom-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.${{ matrix.archive_extension }}
            dist/ragloom-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.sha256.txt
            ragloom-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.spdx.json

  publish-release:
    name: publish-release
    needs:
      - prepare-release
      - release-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Create release tag
        if: needs.prepare-release.outputs.create_tag == 'true'
        shell: bash
        env:
          RELEASE_REF: ${{ needs.prepare-release.outputs.release_ref }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" || true
          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "${existing_sha}" != "${RELEASE_REF}" ]]; then
              echo "release tag ${RELEASE_TAG} already exists at ${existing_sha}, expected ${RELEASE_REF}" >&2
              exit 1
            fi
            echo "release tag ${RELEASE_TAG} already exists at ${RELEASE_REF}; reusing it"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_ref }}
          generate_release_notes: true
          files: release-artifacts/**/*

  publish-best-effort-release-assets:
    name: publish-best-effort-release-assets
    needs:
      - prepare-release
      - publish-release
      - release-binaries-best-effort
    if: always() && needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*-apple-darwin
          path: release-artifacts-macos
          merge-multiple: true

      - name: Publish best-effort macOS assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: release-artifacts-macos/**/*

  publish-crate:
    name: publish-crate
    needs:
      - prepare-release
      - publish-release
      - publish-best-effort-release-assets
    uses: ./.github/workflows/publish-crate.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      tag: ${{ needs.prepare-release.outputs.tag }}
      ref: ${{ needs.prepare-release.outputs.tag }}
    secrets: inherit
