name: publish-crate

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      ref:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Crate version from Cargo.toml (for example 0.1.0)
        required: true
        type: string
      tag:
        description: Release tag to verify before publishing (for example v0.1.0)
        required: true
        type: string
      ref:
        description: Git ref to checkout before publishing (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify release version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG: ${{ inputs.tag }}
        run: python .github/scripts/verify-release-version.py

      - name: Check whether crate version is already published
        id: crates-io
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import json
          import os
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          manifest = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          crate_name = str(manifest["package"]["name"]).strip()
          expected_version = "${{ inputs.version }}".strip()

          url = f"https://crates.io/api/v1/crates/{crate_name}/versions"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  payload = {"versions": []}
              else:
                  raise

          published = any(
              str(version.get("num", "")).strip() == expected_version
              for version in payload.get("versions", [])
          )

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"crate_name={crate_name}\n")
              handle.write(
                  f"should_publish={'false' if published else 'true'}\n"
              )

          if published:
              print(
                  f"crate {crate_name}@{expected_version} already exists on crates.io; skipping publish"
              )
          else:
              print(
                  f"crate {crate_name}@{expected_version} is not yet published; continuing"
              )
          PY

      - name: Package crate
        if: steps.crates-io.outputs.should_publish == 'true'
        run: cargo package

      - name: Dry-run publish
        if: steps.crates-io.outputs.should_publish == 'true'
        run: cargo publish --dry-run

      - name: Publish crate
        if: steps.crates-io.outputs.should_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Skip publish for existing crates.io release
        if: steps.crates-io.outputs.should_publish != 'true'
        run: |
          echo "Skipping cargo publish because ${{ steps.crates-io.outputs.crate_name }} ${{ inputs.version }} is already published on crates.io."
